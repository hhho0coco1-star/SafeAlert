server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**

        - id: subscription-service
          uri: ${SUBSCRIPTION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/subscriptions/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/notifications/**,/api/alerts/**

        - id: notification-ws
          uri: ${NOTIFICATION_WS_URL:ws://localhost:8083}
          predicates:
            - Path=/ws/**

        - id: admin-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/admin/**

jwt:
  secret: ${JWT_SECRET:safealert-auth-service-jwt-secret-key-must-be-at-least-256-bits-long}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
