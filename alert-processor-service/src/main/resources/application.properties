spring.application.name=alert-processor-service
server.port=8087

# Kafka Consumer 설정
spring.kafka.bootstrap-servers=kafka.safealert-infra.svc.cluster.local:9092
spring.kafka.consumer.group-id=alert-processor-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Producer 설정
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# MongoDB 연결 설정
spring.data.mongodb.host=mongodb.safealert-infra.svc.cluster.local
spring.data.mongodb.port=27017
spring.data.mongodb.database=event_store

# Redis 연결 설정
spring.data.redis.host=redis-master.safealert-infra.svc.cluster.local
spring.data.redis.port=6379
