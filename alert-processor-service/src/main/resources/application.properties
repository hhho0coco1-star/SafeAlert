spring.application.name=alert-processor-service
server.port=8087

# Kafka Consumer 설정
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=alert-processor-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Producer 설정
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# MongoDB 연결 설정
spring.data.mongodb.host=${SPRING_DATA_MONGODB_HOST:localhost}
spring.data.mongodb.port=27017
spring.data.mongodb.database=event_store
spring.data.mongodb.username=safealert
spring.data.mongodb.password=safealert123
spring.data.mongodb.authentication-database=admin

# Redis 연결 설정
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379

# Actuator - Prometheus 메트릭 노출
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true

# OpenTelemetry - Jaeger 트레이싱
otel.exporter.otlp.endpoint=http://localhost:4317
otel.resource.attributes=service.name=alert-processor-service


