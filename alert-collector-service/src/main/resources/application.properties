spring.application.name=alert-collector-service
server.port=8086

# Kafka 연결 설정 (Kafka 브로커 주소)
spring.kafka.bootstrap-servers=kafka.safealert-infra.svc.cluster.local:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Redis 연결 설정 (캐시 서버 주소)
spring.data.redis.host=redis.safealert-infra.svc.cluster.local
spring.data.redis.port=6379

# 공공데이터 API 키 (발급받은 디코딩 키 입력)
api.weather.key=1186d19de4548e147be22418d96063008714c638acd20e82b09d6070ac4cebae
api.disaster.key=YOUR_DISASTER_API_KEY
api.dust.key=1186d19de4548e147be22418d96063008714c638acd20e82b09d6070ac4cebae

# 수집 주기 설정 (cron 표현식: 매 5분마다 실행)
scheduler.weather.cron=0 */5 * * * *
scheduler.disaster.cron=0 */5 * * * *
scheduler.dust.cron=0 */5 * * * *
