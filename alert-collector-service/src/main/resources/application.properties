spring.application.name=alert-collector-service
server.port=8086

# Kafka 연결 설정 (Kafka 브로커 주소)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Redis 연결 설정 (캐시 서버 주소)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=6379

# 공공데이터 API 키 (발급받은 디코딩 키 입력)
api.weather.key=1186d19de4548e147be22418d96063008714c638acd20e82b09d6070ac4cebae
api.disaster.key=43K1J1M92B0J4S30
api.dust.key=1186d19de4548e147be22418d96063008714c638acd20e82b09d6070ac4cebae

# 수집 주기 설정 (cron 표현식: 매 5분마다 실행)
scheduler.weather.cron=0 */5 * * * *
scheduler.disaster.cron=0 */5 * * * *
scheduler.dust.cron=0 0 * * * *

resilience4j.circuitbreaker.instances.weatherApi.slidingWindowSize=5
resilience4j.circuitbreaker.instances.weatherApi.failureRateThreshold=60
resilience4j.circuitbreaker.instances.weatherApi.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.weatherApi.permittedNumberOfCallsInHalfOpenState=1

resilience4j.circuitbreaker.instances.dustApi.slidingWindowSize=5
resilience4j.circuitbreaker.instances.dustApi.failureRateThreshold=60
resilience4j.circuitbreaker.instances.dustApi.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.dustApi.permittedNumberOfCallsInHalfOpenState=1

resilience4j.circuitbreaker.instances.disasterApi.slidingWindowSize=5
resilience4j.circuitbreaker.instances.disasterApi.failureRateThreshold=60
resilience4j.circuitbreaker.instances.disasterApi.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.disasterApi.permittedNumberOfCallsInHalfOpenState=1

subscription.service.url=http://localhost:8085

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true

