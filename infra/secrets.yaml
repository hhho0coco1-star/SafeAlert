stringData:
  secret: "safealert-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256"
---
# subscription-service 전용 Secret
apiVersion: v1
kind: Secret
metadata:
  name: subscription-secrets
  namespace: safealert-app
type: Opaque
stringData:
  db-password: "safealert123"
