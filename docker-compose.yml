services:

  # ── 인프라 ──────────────────────────────────────────────────

  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: safealert
      POSTGRES_PASSWORD: safealert123
      POSTGRES_DB: auth_db
    volumes:
      - ./infra/docker/init-postgresql.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safealert -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.7.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: safealert
      MONGO_INITDB_ROOT_PASSWORD: safealert123
      MONGO_INITDB_DATABASE: event_store
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── 백엔드 서비스 ───────────────────────────────────────────

  auth-service:
    build: ./auth-service
    environment:
      DB_HOST: postgresql
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8081:8081"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  subscription-service:
    build: ./subscription-service
    environment:
      DB_HOST: postgresql
      DB_USERNAME: safealert
      DB_PASSWORD: safealert123
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8085:8085"
    depends_on:
      postgresql:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    environment:
      DB_HOST: postgresql
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: safealert-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8085
    ports:
      - "8083:8083"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    environment:
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: safealert-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
      AUTH_SERVICE_URL: http://auth-service:8081
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8085
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      NOTIFICATION_WS_URL: ws://notification-service:8083
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - subscription-service
      - notification-service

  alert-collector-service:
    build: ./alert-collector-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8086:8086"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  alert-processor-service:
    build: ./alert-processor-service
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8087:8087"
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus

  elasticsearch:
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  logstash:
    image: logstash:8.13.0
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch

  kibana:
    image: kibana:8.13.0
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch



volumes:
  pg_data:
  kafka_data:
  mongo_data:
  es_data:
