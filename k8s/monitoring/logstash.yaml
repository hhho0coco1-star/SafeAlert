apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: safealert-monitor
data:
  logstash.conf: |
    input {
      tcp {
        port => 5044
        codec => json_lines
      }
    }
    filter {
      if [service_name] {
        mutate {
          add_field => { "[@metadata][index]" => "%{service_name}" }
        }
      } else {
        mutate {
          add_field => { "[@metadata][index]" => "unknown" }
        }
      }
    }
    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "safealert-%{[@metadata][index]}-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: safealert-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: logstash:8.13.0
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms128m -Xmx256m"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          ports:
            - containerPort: 5044
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
      volumes:
        - name: config
          configMap:
            name: logstash-config
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: safealert-monitor
spec:
  selector:
    app: logstash
  ports:
    - port: 5044
      targetPort: 5044
