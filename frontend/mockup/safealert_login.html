<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeAlert — 로그인 / 회원가입</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f6; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }

  /* 네비게이션 */
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; border-bottom: 0.5px solid #e5e5e5; background: #fff; }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 500; color: #1a1a1a; text-decoration: none; }
  .nav-logo i { font-size: 20px; color: #E24B4A; }
  .nav-links { display: flex; gap: 24px; }
  .nav-link { font-size: 14px; color: #666; text-decoration: none; }
  .nav-link:hover { color: #1a1a1a; }
  .nav-actions { display: flex; gap: 8px; }
  .btn { padding: 7px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; transition: background 0.15s; }
  .btn:hover { background: #f5f5f5; }
  .btn-primary { background: #E24B4A; color: #fff; border-color: #E24B4A; }
  .btn-primary:hover { background: #c93f3e; }

  /* 메인 영역 */
  .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }

  /* 카드 */
  .card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 12px; width: 100%; max-width: 400px; overflow: hidden; }

  /* 탭 */
  .tabs { display: flex; border-bottom: 0.5px solid #e5e5e5; }
  .tab { flex: 1; padding: 14px; font-size: 14px; font-weight: 500; text-align: center; cursor: pointer; color: #999; background: transparent; border: none; transition: color 0.15s; }
  .tab.active { color: #E24B4A; box-shadow: inset 0 -2px 0 #E24B4A; }
  .tab:hover:not(.active) { color: #555; background: #fafafa; }

  /* 폼 영역 */
  .form-body { padding: 28px 28px 24px; }
  .form-header { margin-bottom: 24px; }
  .form-header h2 { font-size: 18px; font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
  .form-header p { font-size: 13px; color: #888; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 9px 12px; border: 0.5px solid #ddd; border-radius: 8px; font-size: 14px; color: #1a1a1a; outline: none; transition: border-color 0.15s; background: #fff; }
  .form-input:focus { border-color: #E24B4A; }
  .form-input::placeholder { color: #bbb; }

  .input-wrapper { position: relative; }
  .input-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 16px; cursor: pointer; }
  .input-icon:hover { color: #666; }

  .forgot-link { display: block; text-align: right; font-size: 12px; color: #888; text-decoration: none; margin-top: -8px; margin-bottom: 16px; }
  .forgot-link:hover { color: #E24B4A; }

  .btn-full { width: 100%; padding: 10px; font-size: 14px; border-radius: 8px; cursor: pointer; border: none; font-weight: 500; transition: background 0.15s; }
  .btn-submit { background: #E24B4A; color: #fff; margin-bottom: 12px; }
  .btn-submit:hover { background: #c93f3e; }

  .divider-text { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
  .divider-text::before, .divider-text::after { content: ''; flex: 1; height: 0.5px; background: #e5e5e5; }
  .divider-text span { font-size: 12px; color: #aaa; white-space: nowrap; }

  .btn-social { background: #fff; border: 0.5px solid #ddd; color: #444; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
  .btn-social:last-of-type { margin-bottom: 0; }
  .btn-social:hover { background: #f5f5f5; }
  .btn-social img { width: 16px; height: 16px; }
  .btn-kakao { background: #FEE500; border-color: #FEE500; color: #191919; }
  .btn-kakao:hover { background: #f0d800; }

  .form-footer { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 0.5px solid #f0f0f0; font-size: 13px; color: #888; }
  .form-footer a { color: #E24B4A; text-decoration: none; font-weight: 500; }
  .form-footer a:hover { text-decoration: underline; }

  /* 체크박스 */
  .checkbox-group { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px; }
  .checkbox-group input[type="checkbox"] { margin-top: 2px; accent-color: #E24B4A; cursor: pointer; flex-shrink: 0; }
  .checkbox-label { font-size: 13px; color: #555; line-height: 1.5; }
  .checkbox-label a { color: #E24B4A; text-decoration: none; }
  .checkbox-label a:hover { text-decoration: underline; }

  /* 이름 두 필드 나란히 */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 패널 숨기기 */
  .panel { display: none; }
  .panel.active { display: block; }

  /* 푸터 */
  footer { padding: 20px 48px; border-top: 0.5px solid #e5e5e5; background: #fff; display: flex; justify-content: space-between; align-items: center; }
  .footer-text { font-size: 13px; color: #888; }
  .footer-links { display: flex; gap: 16px; }
  .footer-link { font-size: 13px; color: #888; text-decoration: none; }
  .footer-link:hover { color: #1a1a1a; }

  /* 비밀번호 강도 */
  .pw-strength { margin-top: 6px; display: flex; gap: 4px; }
  .pw-bar { height: 3px; flex: 1; border-radius: 99px; background: #e5e5e5; transition: background 0.2s; }
  .pw-bar.weak { background: #E24B4A; }
  .pw-bar.medium { background: #BA7517; }
  .pw-bar.strong { background: #639922; }
  .pw-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
</style>
</head>
<body>

  <!-- 네비게이션 -->
  <nav class="nav">
    <a class="nav-logo" href="safealert_landing.html">
      <i class="ti ti-alert-triangle"></i>
      SafeAlert
    </a>
    <div class="nav-links">
      <a class="nav-link" href="#">기능</a>
      <a class="nav-link" href="#">알림 유형</a>
      <a class="nav-link" href="#">공지사항</a>
    </div>
    <div class="nav-actions">
      <button class="btn" onclick="switchTab('login')">로그인</button>
      <button class="btn btn-primary" onclick="switchTab('signup')">회원가입</button>
    </div>
  </nav>

  <!-- 메인 -->
  <main class="main">
    <div class="card">

      <!-- 탭 -->
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">로그인</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
      </div>

      <!-- 로그인 패널 -->
      <div class="panel active" id="panel-login">
        <div class="form-body">
          <div class="form-header">
            <h2>다시 오셨군요</h2>
            <p>이메일과 비밀번호로 로그인하세요</p>
          </div>

          <div class="form-group">
            <label class="form-label">이메일</label>
            <input class="form-input" type="email" placeholder="hello@example.com">
          </div>

          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="login-pw" placeholder="비밀번호를 입력하세요" style="padding-right: 36px;">
              <i class="ti ti-eye input-icon" onclick="togglePw('login-pw', this)"></i>
            </div>
          </div>

          <a class="forgot-link" href="#">비밀번호를 잊으셨나요?</a>

          <button class="btn-full btn-submit">로그인</button>

          <div class="divider-text"><span>또는</span></div>

          <button class="btn-full btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google로 계속하기
          </button>
          <button class="btn-full btn-social btn-kakao">
            <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.7 5.08 4.27 6.48L5.2 21l4.55-2.97C10.43 18.16 11.2 18.2 12 18.2c5.523 0 10-3.477 10-7.4C22 6.477 17.523 3 12 3z" fill="#191919"/>
            </svg>
            Kakao로 계속하기
          </button>

          <div class="form-footer">
            아직 계정이 없으신가요? <a href="#" onclick="switchTab('signup')">회원가입</a>
          </div>
        </div>
      </div>

      <!-- 회원가입 패널 -->
      <div class="panel" id="panel-signup">
        <div class="form-body">
          <div class="form-header">
            <h2>계정을 만들어보세요</h2>
            <p>무료로 시작하고 재난 알림을 바로 받아보세요</p>
          </div>

          <div class="form-group form-row">
            <div>
              <label class="form-label">성</label>
              <input class="form-input" type="text" placeholder="김">
            </div>
            <div>
              <label class="form-label">이름</label>
              <input class="form-input" type="text" placeholder="민준">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">이메일</label>
            <input class="form-input" type="email" placeholder="hello@example.com">
          </div>

          <div class="form-group">
            <label class="form-label">비밀번호</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="signup-pw" placeholder="8자 이상 입력하세요" style="padding-right: 36px;" oninput="checkPwStrength(this.value)">
              <i class="ti ti-eye input-icon" onclick="togglePw('signup-pw', this)"></i>
            </div>
            <div class="pw-strength">
              <div class="pw-bar" id="pw-bar-1"></div>
              <div class="pw-bar" id="pw-bar-2"></div>
              <div class="pw-bar" id="pw-bar-3"></div>
            </div>
            <div class="pw-hint" id="pw-hint">영문, 숫자, 특수문자 조합 8자 이상</div>
          </div>

          <div class="form-group">
            <label class="form-label">비밀번호 확인</label>
            <div class="input-wrapper">
              <input class="form-input" type="password" id="signup-pw2" placeholder="비밀번호를 다시 입력하세요" style="padding-right: 36px;">
              <i class="ti ti-eye input-icon" onclick="togglePw('signup-pw2', this)"></i>
            </div>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="agree-terms">
            <label class="checkbox-label" for="agree-terms">
              <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의합니다 <span style="color:#E24B4A;">(필수)</span>
            </label>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="agree-marketing">
            <label class="checkbox-label" for="agree-marketing">
              재난 알림 서비스 관련 마케팅 정보 수신에 동의합니다 <span style="color:#aaa;">(선택)</span>
            </label>
          </div>

          <button class="btn-full btn-submit" style="margin-top: 8px;">회원가입</button>

          <div class="divider-text"><span>또는</span></div>

          <button class="btn-full btn-social">
            <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google로 계속하기
          </button>
          <button class="btn-full btn-social btn-kakao">
            <svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.7 5.08 4.27 6.48L5.2 21l4.55-2.97C10.43 18.16 11.2 18.2 12 18.2c5.523 0 10-3.477 10-7.4C22 6.477 17.523 3 12 3z" fill="#191919"/>
            </svg>
            Kakao로 계속하기
          </button>

          <div class="form-footer">
            이미 계정이 있으신가요? <a href="#" onclick="switchTab('login')">로그인</a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- 푸터 -->
  <footer>
    <div style="display: flex; align-items: center; gap: 6px;">
      <i class="ti ti-alert-triangle" style="font-size:16px; color: #E24B4A;"></i>
      <span class="footer-text" style="font-weight: 500; color: #1a1a1a;">SafeAlert</span>
    </div>
    <span class="footer-text">공공데이터 기반 실시간 재난 알림 플랫폼</span>
    <div class="footer-links">
      <a class="footer-link" href="#">이용약관</a>
      <a class="footer-link" href="#">개인정보처리방침</a>
    </div>
  </footer>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-signup').classList.toggle('active', !isLogin);
    document.getElementById('panel-login').classList.toggle('active', isLogin);
    document.getElementById('panel-signup').classList.toggle('active', !isLogin);
  }

  function togglePw(id, icon) {
    const input = document.getElementById(id);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    icon.classList.toggle('ti-eye', isText);
    icon.classList.toggle('ti-eye-off', !isText);
  }

  function checkPwStrength(val) {
    const bars = [
      document.getElementById('pw-bar-1'),
      document.getElementById('pw-bar-2'),
      document.getElementById('pw-bar-3')
    ];
    const hint = document.getElementById('pw-hint');

    bars.forEach(b => b.className = 'pw-bar');

    if (!val) { hint.textContent = '영문, 숫자, 특수문자 조합 8자 이상'; return; }

    let score = 0;
    if (val.length >= 8) score++;
    if (/[0-9]/.test(val) && /[a-zA-Z]/.test(val)) score++;
    if (/[^a-zA-Z0-9]/.test(val)) score++;

    if (score === 1) {
      bars[0].classList.add('weak');
      hint.textContent = '약함 — 숫자나 특수문자를 추가하세요';
      hint.style.color = '#E24B4A';
    } else if (score === 2) {
      bars[0].classList.add('medium'); bars[1].classList.add('medium');
      hint.textContent = '보통 — 특수문자를 추가하면 더 안전해요';
      hint.style.color = '#BA7517';
    } else if (score === 3) {
      bars.forEach(b => b.classList.add('strong'));
      hint.textContent = '강함 — 안전한 비밀번호예요';
      hint.style.color = '#639922';
    }
  }
</script>
</body>
</html>
