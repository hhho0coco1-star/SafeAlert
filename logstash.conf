# ── 입력 설정 ─────────────────────────────────────────────────
# 각 Spring Boot 서비스가 TCP 5044 포트로 JSON 로그를 전송
# codec => json_lines : 한 줄이 하나의 JSON 객체
input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

# ── 필터 설정 ─────────────────────────────────────────────────
# logback에서 보낸 service_name 필드를 인덱스 이름에 사용
# 예) service_name=auth-service → @metadata[index]=auth-service
filter {
  if [service_name] {
    mutate {
      add_field => { "[@metadata][index]" => "%{service_name}" }
    }
  } else {
    # service_name 필드가 없는 경우 "unknown"으로 처리
    mutate {
      add_field => { "[@metadata][index]" => "unknown" }
    }
  }
}

# ── 출력 설정 ─────────────────────────────────────────────────
# Elasticsearch에 날짜별로 인덱스 분리하여 저장
# 인덱스 예시: safealert-auth-service-2026.05.30
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "safealert-%{[@metadata][index]}-%{+YYYY.MM.dd}"
  }
}
