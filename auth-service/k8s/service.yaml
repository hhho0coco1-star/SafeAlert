# 1. 리소스 종류 정의
apiVersion: v1            # Service 리소스가 사용하는 API 버전
kind: Service             # 생성하려는 리소스가 '서비스(네트워크 통로)'임을 명시

# 2. 서비스의 이름과 소속
metadata:
  name: auth-service       # 이 서비스의 이름 (클러스터 내부에서 이 이름으로 접속 가능)
  namespace: safealert-app # Deployment와 같은 네임스페이스에 있어야 연결이 가능함

# 3. 서비스의 상세 네트워크 설정
spec:
  # [핵심] 어떤 포드(Pod)로 연결해줄 것인가?
  selector:
    app: auth-service      # Deployment에서 설정했던 labels(app: auth-service)과 
                           # 일치하는 포드들을 찾아 네트워크를 연결함

  # 포트 설정
  ports:
    - protocol: TCP        # 사용할 통신 프로토콜 (기본값 TCP)
      port: 8081           # 서비스 자체가 클러스터 내부에서 노출할 포트 번호
      targetPort: 8081     # 실제 컨테이너(Pod) 내부에서 실행 중인 애플리케이션의 포트 번호

  # 서비스 타입
  type: ClusterIP          # 클러스터 내부 전용 IP를 할당함 (기본값)
                           # 외부에서는 접속할 수 없고, 클러스터 내부의 다른 서비스들만 
                           # 'auth-service:8081' 주소로 접속할 수 있음