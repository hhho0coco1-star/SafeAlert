server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: safealert
    password: safealert123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: safealert-auth-service-jwt-secret-key-must-be-at-least-256-bits-long
  access-token-expiry: 900000       # 15분 (ms)
  refresh-token-expiry: 604800000   # 7일 (ms)
